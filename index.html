<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Manager v2 — The Lineage Studio</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🌳</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--f:#5B8C5A;--fd:#4A7A49;--fbg:#5B8C5A14;--gold:#D4A853;--gbg:#D4A85314;--emb:#E8913A;--ebg:#E8913A14;--red:#C75146;--rbg:#C7514614;--teal:#2E7D6F;--tbg:#2E7D6F14;--sl:#8B8B8B;--slbg:#8B8B8B14;--bg:#FAF7F2;--cr:#F3EDE3;--bk:#3B2F24;--bm:#6B5D50;--bl:#9B8E80;--ink:#2C2420;--w:#fff;--r:10px;--rs:6px;--sh:0 1px 3px rgba(59,47,36,.06);--shm:0 4px 16px rgba(59,47,36,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;line-height:1.5}
h1,h2,h3{font-family:'Cormorant Garamond',serif;font-weight:600}
::selection{background:#5B8C5A33}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#C4B49A55;border-radius:3px}
input,select,textarea,button{font-family:'DM Sans',sans-serif}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--f)!important;box-shadow:0 0 0 3px #5B8C5A22}
button{cursor:pointer;transition:all .15s;border:none}
button:active{transform:scale(.97)}
a{color:var(--f);text-decoration:none}

/* Layout */
header{background:var(--w);border-bottom:1px solid #E8E2D8;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:100;box-shadow:var(--sh)}
.hl{display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;background:var(--f);color:var(--w);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-weight:700;font-size:11px;letter-spacing:.5px}
.ht{font-size:17px;color:var(--bk);line-height:1.1}
.hs{font-size:9px;color:var(--bl);font-weight:600;letter-spacing:.8px;text-transform:uppercase}
nav{display:flex;gap:2px}
.nb{padding:6px 12px;border-radius:var(--rs);background:0 0;color:var(--bm);font-size:11px;font-weight:500;display:flex;align-items:center;gap:4px}
.nb:hover{background:var(--cr);color:var(--bk)}
.nb.on{background:var(--f);color:var(--w)}.nb.on:hover{background:var(--fd)}
main{flex:1;padding:20px 24px;max-width:1400px;width:100%;margin:0 auto}

/* Toast */
.toast{position:fixed;bottom:18px;right:18px;background:var(--bk);color:var(--w);padding:9px 16px;border-radius:var(--r);font-size:11px;font-weight:500;box-shadow:var(--shm);z-index:999;animation:ti .3s ease}
@keyframes ti{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes si{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
@keyframes pu{0%,100%{opacity:.4}50%{opacity:1}}

/* Cards */
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-bottom:20px}
.sc{background:var(--w);border-radius:var(--r);padding:16px;box-shadow:var(--sh);border-left:4px solid var(--f);animation:fi .3s ease both;transition:box-shadow .15s,transform .15s}
.sc:hover{box-shadow:var(--shm);transform:translateY(-1px)}
.sc .lb{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--bl);font-weight:600;margin-bottom:3px}
.sc .vl{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:var(--bk)}
.sc .su{font-size:10px;color:var(--bm);margin-top:2px}

/* Pipeline */
.pc{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:10px}
.pcol{background:var(--w);border-radius:var(--r);padding:12px;box-shadow:var(--sh)}
.pch{display:flex;align-items:center;gap:6px;margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid #EDE8E0}
.sd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pct{font-size:11px;font-weight:600;color:var(--bk)}
.pcc{font-size:9px;color:var(--bl);margin-left:auto;font-weight:600;background:var(--cr);padding:1px 6px;border-radius:10px}
.pi{padding:6px 8px;margin-bottom:4px;background:var(--bg);border-radius:var(--rs);font-size:11px;color:var(--bk);cursor:pointer;transition:background .1s}
.pi:hover{background:var(--cr)}
.pin{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pis{font-size:9px;color:var(--bl);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Toolbar */
.tb{display:flex;align-items:center;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.sw{position:relative;flex:1;min-width:160px}
.sic{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--bl);font-size:12px;pointer-events:none}
.sb{width:100%;padding:7px 10px 7px 28px;border:1px solid #DDD7CD;border-radius:var(--rs);font-size:11px;background:var(--w)}
.fs{padding:7px 10px;border:1px solid #DDD7CD;border-radius:var(--rs);font-size:11px;background:var(--w);color:var(--bk);min-width:120px}
.btn{padding:7px 12px;border-radius:var(--rs);font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.bp{background:var(--f);color:var(--w)}.bp:hover{background:var(--fd)}
.bs{background:var(--cr);color:var(--bk)}.bs:hover{background:#E8E2D8}
.bd{background:var(--red);color:var(--w)}.bd:hover{background:#B04439}
.bsm{padding:5px 9px;font-size:10px}
.bo{background:#0078D4;color:var(--w)}.bo:hover{background:#106EBE}
.bmark{background:var(--teal);color:var(--w)}.bmark:hover{background:#236B5F}

/* Table */
.tw{background:var(--w);border-radius:var(--r);box-shadow:var(--sh);overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:800px}
thead{background:#F9F6F1}
th{padding:8px 12px;text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--bl);border-bottom:1px solid #EDE8E0;cursor:pointer;white-space:nowrap;user-select:none}
th:hover{color:var(--bk)}
th.sorted{color:var(--f)}
td{padding:8px 12px;font-size:11px;border-bottom:1px solid #F3EDE3;color:var(--bk);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tbody tr{transition:background .1s;cursor:pointer}
tbody tr:hover{background:#FAF7F2}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.ln{font-weight:600;color:var(--bk)}.ln:hover{color:var(--f)}
.le{font-size:10px;color:var(--bl)}
.lck{width:14px;height:14px;accent-color:var(--f);cursor:pointer}

/* Next Step badges */
.ns-urgent{color:var(--red);font-weight:600;font-size:10px}
.ns-ready{color:var(--emb);font-weight:500;font-size:10px}
.ns-wait{color:var(--bl);font-size:10px}
.ns-none{color:#BBB;font-size:10px;font-style:italic}
.ns-action{color:var(--f);font-weight:600;font-size:10px;cursor:pointer;text-decoration:underline;text-underline-offset:2px}
.ns-action:hover{color:var(--fd)}

/* Bulk bar */
.bb{display:flex;align-items:center;gap:7px;padding:8px 12px;background:var(--f);color:var(--w);border-radius:var(--r);margin-bottom:10px;font-size:11px;font-weight:500;animation:fi .2s ease}
.bb button{background:rgba(255,255,255,.2);color:#fff;padding:4px 9px;border-radius:var(--rs);font-size:10px;font-weight:600}
.bb button:hover{background:rgba(255,255,255,.3)}
.bb .bbd{background:rgba(199,81,70,.7)}.bb .bbd:hover{background:rgba(199,81,70,.9)}

/* Panels */
.ov{position:fixed;inset:0;background:rgba(44,36,32,.25);z-index:200;display:flex;justify-content:flex-end}
.dp{width:480px;max-width:100vw;background:var(--w);height:100vh;overflow-y:auto;box-shadow:-8px 0 32px rgba(44,36,32,.12);animation:si .25s ease;padding:22px}
.dph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.dpn{font-size:22px;color:var(--bk)}
.dpx{background:none;font-size:18px;color:var(--bl);padding:4px}.dpx:hover{color:var(--bk)}
.dpg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.df label{display:block;font-size:9px;text-transform:uppercase;letter-spacing:.7px;color:var(--bl);font-weight:600;margin-bottom:2px}
.df .v{font-size:12px;color:var(--bk)}
.dpm{margin-bottom:16px}
.dpm .v{font-size:12px;color:var(--bk);white-space:pre-wrap;background:var(--bg);padding:9px;border-radius:var(--rs);min-height:36px;line-height:1.5}
.dpa{display:flex;gap:5px;flex-wrap:wrap}

/* Forms */
.fc{background:var(--w);border-radius:var(--r);padding:22px;box-shadow:var(--sh);animation:fi .3s ease;margin-bottom:14px}
.fc h2{font-size:18px;color:var(--bk);margin-bottom:14px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fig{display:flex;flex-direction:column}
.fig.full{grid-column:1/-1}
.fig label{font-size:10px;font-weight:600;color:var(--bm);margin-bottom:3px}
.fi{padding:7px 9px;border:1px solid #DDD7CD;border-radius:var(--rs);font-size:11px;background:var(--w);color:var(--ink);width:100%}
textarea.fi{resize:vertical;min-height:50px}
.fa{display:flex;gap:5px;margin-top:12px;grid-column:1/-1}

/* Compose */
.cl{display:grid;grid-template-columns:240px 1fr;gap:14px}
.csb{display:flex;flex-direction:column;gap:5px}
.tc{background:var(--w);border-radius:var(--r);padding:10px 12px;box-shadow:var(--sh);cursor:pointer;border:2px solid transparent;transition:all .15s}
.tc:hover{border-color:var(--cr)}.tc.on{border-color:var(--f);background:var(--fbg)}
.tcl{font-size:11px;font-weight:600;color:var(--bk)}
.tcd{font-size:9px;color:var(--bl);margin-top:1px}
.cc{background:var(--w);border-radius:var(--r);padding:18px;box-shadow:var(--sh)}
.cc h3{font-size:15px;color:var(--bk);margin-bottom:10px}
.eo{background:var(--bg);border-radius:var(--rs);padding:14px;font-size:12px;line-height:1.7;color:var(--bk);white-space:pre-wrap;min-height:140px;border:1px solid #EDE8E0}
.esl{background:var(--bg);border-radius:var(--rs);padding:7px 10px;font-size:11px;font-weight:500;color:var(--bk);margin-bottom:8px;border:1px solid #EDE8E0}
.gen{color:var(--bl);font-style:italic;animation:pu 1.5s ease infinite}
.lpl{max-height:170px;overflow-y:auto}
.lpi{padding:6px 8px;border-radius:var(--rs);cursor:pointer;display:flex;align-items:center;gap:7px;transition:background .1s;font-size:11px}
.lpi:hover{background:var(--cr)}.lpi.on{background:var(--fbg)}

/* Sent actions bar */
.sent-bar{display:flex;gap:6px;align-items:center;padding:10px 14px;background:var(--cr);border-radius:var(--rs);margin-top:10px}
.sent-bar .sep{width:1px;height:20px;background:#DDD7CD}

/* Import */
.mg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.cpre{margin-top:10px;overflow-x:auto}
.cpre table{font-size:10px;min-width:auto}.cpre th{background:var(--cr);font-size:8px}.cpre td{font-size:10px;padding:4px 7px;max-width:120px}

/* Settings */
.sr{margin-bottom:14px}
.sr label{font-size:10px;font-weight:600;color:var(--bm);display:block;margin-bottom:3px}
.sr p{font-size:10px;color:var(--bl);margin-bottom:5px}

.empty{text-align:center;padding:40px 20px;color:var(--bl)}
.empty h3{font-size:16px;margin-bottom:5px;color:var(--bm)}

@media(max-width:768px){
  header{padding:0 10px;flex-wrap:wrap;height:auto;padding:8px 10px;gap:5px}
  main{padding:12px}
  .cl{grid-template-columns:1fr}
  .fg{grid-template-columns:1fr}
  .dp{width:100%}
  .dg{grid-template-columns:repeat(2,1fr)}
  .pc{grid-template-columns:repeat(2,1fr)}
  .mg{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
const ST={
  New:{c:'#5B8C5A',bg:'#5B8C5A14'},
  Contacted:{c:'#D4A853',bg:'#D4A85314'},
  Warm:{c:'#E8913A',bg:'#E8913A14'},
  Replied:{c:'#2E7D6F',bg:'#2E7D6F14'},
  Bounced:{c:'#C75146',bg:'#C7514614'},
  Unsubscribed:{c:'#8B8B8B',bg:'#8B8B8B14'},
  Won:{c:'#2E7D6F',bg:'#2E7D6F14'},
  Lost:{c:'#7B68A5',bg:'#7B68A514'},
};
const INTERESTS=['Family History Book','Family Tree Chart','Genealogy Research','Photo Restoration','Legacy or Memorial Book','Oral History Interview','DNA Interpretation','Heritage Consultation','Reunion Memory Book','Obituary Writing','Gift','Just Exploring','Not sure yet','Custom Package'];
const ETYPES={
  initial:{label:'Initial Response',icon:'✦',desc:'First reply to a new inquiry'},
  reengage:{label:'Re-Engage',icon:'↻',desc:'Reconnect with cold leads'},
  followup:{label:'Follow-Up',icon:'→',desc:'Continue the conversation'},
  promo:{label:'Promo / Newsletter',icon:'★',desc:'HTML email with offer options'},
};
const PROMO_TPLS={
  newsletter:{label:'General Newsletter',desc:'Monthly update with tip + services + offer'},
  holiday:{label:'Holiday / Reunion Season',desc:'Seasonal family gathering promo'},
  newservices:{label:'New Services',desc:'Announce new service offerings'},
};
// HTML Email Template Builder
function buildHTMLEmail(tplKey, data){
  const {name,greeting,body,offer,subject}=data;
  const offerBanner={
    none:'',
    "10off":`<div style="background:#2E5339;padding:22px 36px;text-align:center"><h2 style="font-family:Georgia,serif;font-size:18px;color:#fff;margin:0 0 6px">Special Offer: 10% Off</h2><p style="font-size:13px;color:#C5DECA;margin:0 0 12px">For a limited time, take 10% off any Lineage Studio service. Just reply to this email to get started.</p><a href="mailto:info@lineagestudio.org?subject=10%25 Off Offer" style="display:inline-block;background:#D4A853;color:#1B2A4A;font-size:13px;font-weight:700;padding:10px 24px;border-radius:6px;text-decoration:none">Claim Your 10% Off →</a></div>`,
    freepage:`<div style="background:#2E5339;padding:22px 36px;text-align:center"><h2 style="font-family:Georgia,serif;font-size:18px;color:#fff;margin:0 0 6px">Free Sample Page</h2><p style="font-size:13px;color:#C5DECA;margin:0 0 12px">See the quality before you commit — I'll create a free sample page from your family's story. No obligation.</p><a href="mailto:info@lineagestudio.org?subject=Free Sample Page" style="display:inline-block;background:#D4A853;color:#1B2A4A;font-size:13px;font-weight:700;padding:10px 24px;border-radius:6px;text-decoration:none">Request Your Free Page →</a></div>`,
    consultation:`<div style="background:#2E5339;padding:22px 36px;text-align:center"><h2 style="font-family:Georgia,serif;font-size:18px;color:#fff;margin:0 0 6px">Free Discovery Call</h2><p style="font-size:13px;color:#C5DECA;margin:0 0 12px">Not sure where to start? Book a free 20-minute call and I'll help you plan your family history project.</p><a href="mailto:info@lineagestudio.org?subject=Free Discovery Call" style="display:inline-block;background:#D4A853;color:#1B2A4A;font-size:13px;font-weight:700;padding:10px 24px;border-radius:6px;text-decoration:none">Schedule Your Call →</a></div>`,
    custom:`<div style="background:#2E5339;padding:22px 36px;text-align:center"><h2 style="font-family:Georgia,serif;font-size:18px;color:#fff;margin:0 0 6px">[YOUR OFFER HEADLINE]</h2><p style="font-size:13px;color:#C5DECA;margin:0 0 12px">[Describe your custom offer here]</p><a href="mailto:info@lineagestudio.org" style="display:inline-block;background:#D4A853;color:#1B2A4A;font-size:13px;font-weight:700;padding:10px 24px;border-radius:6px;text-decoration:none">Get Started →</a></div>`,
  }[data.offer]||'';
  const footer=`<div style="background:#1B2A4A;padding:22px 36px;text-align:center"><p style="font-size:10px;color:#8B9DC3;margin:0 0 4px"><a href="https://lineagestudio.org" style="color:#D4A853;text-decoration:none">Website</a> · <a href="mailto:info@lineagestudio.org" style="color:#D4A853;text-decoration:none">Email</a></p><p style="font-size:10px;color:#8B9DC3;margin:0 0 4px">The Lineage Studio · Preserving family legacies, one story at a time.</p><p style="font-size:10px;color:#8B9DC3;margin:0 0 4px">Feel free to email me anytime at <a href="mailto:info@lineagestudio.org" style="color:#D4A853">info@lineagestudio.org</a></p><p style="font-size:9px;color:#6B7B9C;margin:8px 0 0"><a href="https://mainstreet-ai.github.io/lineage-studio-site/unsubscribe" style="color:#8B9DC3">Unsubscribe</a></p></div>`;
  const bodyHTML=body.split('\n\n').map(p=>`<p style="font-size:14px;color:#4A4A4A;line-height:1.65;margin:0 0 14px">${p.replace(/\n/g,'<br>')}</p>`).join('');
  const wrap=(inner)=>`<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>${subject||'The Lineage Studio'}</title></head><body style="margin:0;padding:0;background:#F5F2ED;font-family:'Segoe UI',Arial,sans-serif"><div style="max-width:600px;margin:0 auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06)">${inner}${footer}</div></body></html>`;

  if(tplKey==='newsletter'){
    return wrap(`
      <div style="background:#1B2A4A;padding:32px 36px;text-align:center"><div style="font-family:Georgia,serif;font-size:26px;font-weight:700;color:#fff;letter-spacing:1px">The Lineage Studio</div><div style="font-size:11px;color:#8B9DC3;letter-spacing:2px;text-transform:uppercase;margin-top:4px">Preserving Your Family's Legacy</div></div>
      <div style="padding:28px 36px">${bodyHTML}</div>
      <div style="background:#E8913A;padding:24px 36px;text-align:center"><h2 style="font-family:Georgia,serif;font-size:18px;color:#fff;margin:0 0 4px">Our Services</h2><p style="font-size:12px;color:#FFF3E6;margin:0 0 14px">From research to finished keepsakes</p><table width="100%" cellpadding="0" cellspacing="0"><tr><td align="center" style="font-size:12px;color:#fff;padding:6px;font-weight:600">📖 Family History Books</td><td align="center" style="font-size:12px;color:#fff;padding:6px;font-weight:600">🌳 Family Tree Charts</td><td align="center" style="font-size:12px;color:#fff;padding:6px;font-weight:600">🔍 Genealogy Research</td></tr><tr><td align="center" style="font-size:12px;color:#fff;padding:6px;font-weight:600">🖼️ Photo Restoration</td><td align="center" style="font-size:12px;color:#fff;padding:6px;font-weight:600">🎙️ Oral History</td><td align="center" style="font-size:12px;color:#fff;padding:6px;font-weight:600">🧬 DNA Interpretation</td></tr></table></div>
      ${offerBanner}
      <div style="padding:24px 36px;background:#FAF7F2;text-align:center"><h2 style="font-family:Georgia,serif;font-size:16px;color:#1B2A4A;margin:0 0 8px">See What a Family Book Looks Like</h2><div style="background:#fff;border:1px solid #E8E2D8;border-radius:8px;padding:16px;text-align:center"><div style="font-family:Georgia,serif;font-size:15px;color:#1B2A4A;margin:0 0 4px">History of the Williams Family</div><div style="font-size:11px;color:#8B8B8B;margin:0 0 10px">Sample · 36 Pages · Hardcover</div><div style="font-size:11px;color:#555;line-height:1.7;text-align:left">✦ Professional genealogy research<br>✦ Biographical chapters for ancestors<br>✦ Custom family tree spread<br>✦ Restored photos &amp; images<br>✦ Printed hardcover keepsake</div></div><p style="font-size:11px;color:#8B8B8B;margin:10px 0 0">Starting at $497 · Payment plans available</p></div>
    `);
  }
  if(tplKey==='holiday'){
    return wrap(`

// Read API key from URL hash if present (e.g. #key=sk-ant-...)
function getKeyFromHash(){
  const h=window.location.hash;
  const m=h.match(/key=([^&]+)/);
  return m?decodeURIComponent(m[1]):'';
}
function setKeyInHash(k){
  if(k){window.location.hash='key='+encodeURIComponent(k)}
  else{history.replaceState(null,'',window.location.pathname)}
}
// Merge: URL hash > localStorage > CONFIG defaults
function loadApiKey(){
  return getKeyFromHash()||localStorage.getItem('tls_api_key')||CONFIG.apiKey||'';
}
function loadWebhooks(){
  const stored=JSON.parse(localStorage.getItem('tls_webhooks')||'{}');
  return{
    emailGen:stored.emailGen||CONFIG.webhooks.emailGen||'',
    sync:stored.sync||CONFIG.webhooks.sync||'',
    addLead:stored.addLead||CONFIG.webhooks.addLead||'',
    updateStatus:stored.updateStatus||CONFIG.webhooks.updateStatus||''
  };
}

let S={leads:[],view:'dashboard',sel:null,editing:null,search:'',filter:'all',filterType:'all',promoOffer:'none',showAdd:false,
  tpl:'reengage',cLead:null,genEmail:'',genSubj:'',genHTML:'',isGen:false,promoTpl:'newsletter',
  bulk:new Set(),csv:null,csvMap:{},bulkQueue:[],bulkIdx:0,bulkResults:[],bulkEmails:[],
  sortCol:'',sortDir:1,
  apiKey:loadApiKey(),
  webhooks:loadWebhooks(),
  notif:null,nT:null};

function init(){
  try{const d=localStorage.getItem('tls_leads_v2');
    if(d){S.leads=JSON.parse(d)}else{S.leads=SEED.map((r,i)=>({...r,id:'s'+i}));saveL()}
  }catch(e){S.leads=SEED.map((r,i)=>({...r,id:'s'+i}));saveL()}
  render();
  // Auto-sync from Excel on page load
  if(S.webhooks.sync){
    fetch(S.webhooks.sync).then(r=>r.json()).then(d=>{
      if(Array.isArray(d)&&d.length){
        S.leads=sanitizeLeads(d.map((r,i)=>({...r,id:'sync'+i})));
        saveL();notify('\u2705 Auto-synced '+d.length+' leads from Excel');render();
      }
    }).catch(()=>{});
  }
}
function saveL(){localStorage.setItem('tls_leads_v2',JSON.stringify(S.leads))}
function saveK(){localStorage.setItem('tls_api_key',S.apiKey);setKeyInHash(S.apiKey)}
function saveW(){localStorage.setItem('tls_webhooks',JSON.stringify(S.webhooks))}
function notify(m){S.notif=m;clearTimeout(S.nT);render();S.nT=setTimeout(()=>{S.notif=null;render()},3e3)}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function badge(st){const c=ST[st]||ST.New;return`<span class="badge" style="background:${c.bg};color:${c.c}">● ${st}</span>`}
function daysSinceDate(d){
  if(!d)return 999;
  let dt;
  if(typeof d==='number'){dt=new Date((d-25569)*864e5)}
  else{dt=new Date(String(d).split('T')[0])}
  if(isNaN(dt.getTime()))return 999;
  return Math.max(0,Math.floor((Date.now()-dt.getTime())/864e5));
}
function fmtDate(d){
  if(!d)return'—';
  let dt;
  if(typeof d==='number'){dt=new Date((d-25569)*864e5)}
  else{dt=new Date(String(d).split('T')[0])}
  if(isNaN(dt.getTime()))return'—';
  return dt.toISOString().slice(0,10);
}
function go(v){S.view=v;S.showAdd=false;if(v==='allleads'&&S.filter==='needAction'){S.sortCol='_nextStep';S.sortDir=1}render()}

// ── NEXT STEP LOGIC ──
function nextStep(l){
  const st=l.Status, lt=l.Last_Email_Type, ld=l.Last_Email_Date;
  const ds=ld?daysSinceDate(ld):999;
  if(st==='Bounced')return{text:'No action — bounced',cls:'ns-none',act:null};
  if(st==='Unsubscribed')return{text:'No action — unsubscribed',cls:'ns-none',act:null};
  if(!lt||!ld){
    if(st==='New')return{text:'Send Initial Response',cls:'ns-urgent',act:'initial'};
    return{text:'Send Re-Engage',cls:'ns-urgent',act:'reengage'};
  }
  if(lt==='Initial Response'){
    if(ds<5)return{text:'Wait — check back in '+(5-ds)+'d',cls:'ns-wait',act:null};
    if(ds<=14)return{text:'Send Follow-Up',cls:'ns-ready',act:'followup'};
    return{text:'Send Follow-Up (overdue)',cls:'ns-urgent',act:'followup'};
  }
  if(lt==='Follow-Up'){
    if(ds<7)return{text:'Wait — check back in '+(7-ds)+'d',cls:'ns-wait',act:null};
    return{text:'Re-Engage or Archive',cls:'ns-ready',act:'reengage'};
  }
  if(lt==='Re-Engage'){
    if(ds<14)return{text:'Wait — check back in '+(14-ds)+'d',cls:'ns-wait',act:null};
    return{text:'Newsletter or Archive',cls:'ns-ready',act:'promo'};
  }
  if(lt==='Unsubscribed')return{text:'No action',cls:'ns-none',act:null};
  return{text:'Review manually',cls:'ns-wait',act:null};
}

function getFiltered(){
  let list=S.leads.filter(l=>{
    const q=S.search.toLowerCase();
    const ms=!q||[l.Name,l.Email,l.Interest,l.Message,l.Notes,l.Last_Email_Type].some(f=>f&&f.toLowerCase().includes(q));
    const mf=S.filter==='all'||(S.filter==='needAction'?nextStep(l).act!==null:l.Status===S.filter);
    const mt=S.filterType==='all'||
      (S.filterType==='none'&&!l.Last_Email_Type)||
      l.Last_Email_Type===S.filterType;
    return ms&&mf&&mt;
  });
  if(S.sortCol){
    list=[...list].sort((a,b)=>{
      let va=a[S.sortCol]??'', vb=b[S.sortCol]??'';
      if(S.sortCol==='Days_Since_Inquiry'){va=Number(va)||0;vb=Number(vb)||0;return(va-vb)*S.sortDir}
      if(S.sortCol==='_nextStep'){va=nextStep(a).text;vb=nextStep(b).text}
      return String(va).localeCompare(String(vb))*S.sortDir;
    });
  }
  return list;
}

function getStats(){
  const l=S.leads;
  const r={total:l.length};
  Object.keys(ST).forEach(k=>r[k]=l.filter(x=>x.Status===k).length);
  r.needAction=l.filter(x=>{const n=nextStep(x);return n.act!==null}).length;
  return r;
}

        ${['dashboard','allleads','compose','settings'].map(v=>`<button class="nb ${S.view===v?'on':''}" onclick="go('${v}')">${{dashboard:'◉ Dashboard',allleads:'☰ All Leads',compose:'✎ Compose',settings:'⚙ Settings'}[v]}</button>`).join('')}

    </header>
    <main>${(V[S.view]||V.dashboard)()}</main>
    ${S.sel&&!S.editing?detailPanel():''}
    ${S.editing?editPanel():''}
  `;
}

// ── VIEWS ──
const V={};

// DASHBOARD
V.dashboard=()=>{
  const s=getStats();
  const groups={};Object.keys(ST).forEach(k=>groups[k]=S.leads.filter(l=>l.Status===k));
  let pipe='';
  for(const[k,cfg]of Object.entries(ST)){
    const items=groups[k]||[];if(!items.length)continue;
    pipe+=`<div class="pcol"><div class="pch" style="cursor:pointer" onclick="S.filter='${k}';go('allleads')"><span class="sd" style="background:${cfg.c}"></span><span class="pct">${k}</span><span class="pcc">${items.length}</span></div>${items.slice(0,5).map(l=>`<div class="pi" onclick="openL('${l.id}')"><div class="pin">${esc(l.Name)}</div><div class="pis">${esc(l.Interest||'')}</div></div>`).join('')}${items.length>5?`<div style="font-size:9px;color:var(--bl);padding:2px 8px">+${items.length-5} more</div>`:''}</div>`;
  }
  const intC={};S.leads.forEach(l=>{const k=l.Interest||'Unknown';intC[k]=(intC[k]||0)+1});
  const intS=Object.entries(intC).sort((a,b)=>b[1]-a[1]);
  return`
    <div class="dg">
      <div class="sc" style="border-left-color:var(--f);cursor:pointer" onclick="S.filter='all';go('allleads')"><div class="lb">Total Leads</div><div class="vl">${s.total}</div></div>
      <div class="sc" style="border-left-color:#5B8C5A;cursor:pointer" onclick="S.filter='New';go('allleads')"><div class="lb">New</div><div class="vl">${s.New||0}</div></div>
      <div class="sc" style="border-left-color:var(--gold);cursor:pointer" onclick="S.filter='Contacted';go('allleads')"><div class="lb">Contacted</div><div class="vl">${s.Contacted||0}</div></div>
      <div class="sc" style="border-left-color:var(--red);cursor:pointer" onclick="S.filter='Bounced';go('allleads')"><div class="lb">Bounced</div><div class="vl">${s.Bounced||0}</div></div>
      <div class="sc" style="border-left-color:var(--emb);cursor:pointer" onclick="S.filter='needAction';go('allleads')"><div class="lb">Need Action</div><div class="vl">${s.needAction}</div><div class="su">leads ready for outreach</div></div>
      <div class="sc" style="border-left-color:var(--sl);cursor:pointer" onclick="S.filter='Unsubscribed';go('allleads')"><div class="lb">Unsubscribed</div><div class="vl">${s.Unsubscribed||0}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 280px;gap:14px">
      <div><h2 style="font-size:18px;color:var(--bk);margin-bottom:10px">Pipeline</h2><div class="pc">${pipe}</div></div>
      <div class="fc" style="margin:0"><h3 style="font-size:14px;margin-bottom:8px">By Interest</h3>${intS.map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:11px;border-bottom:1px solid #F3EDE3"><span style="color:var(--bk)">${esc(k)}</span><span style="font-weight:600;color:var(--bm)">${v}</span></div>`).join('')}</div>
    </div>
  `;
};

// ALL LEADS TABLE
V.allleads=()=>{
  const fl=getFiltered();
  const bs=S.bulk.size;
  let bulkBar='';
  if(bs>0){
    bulkBar=`<div class="bb"><span>${bs} selected</span>
      <select onchange="bulkSt(this.value)" style="background:rgba(255,255,255,.2);color:#fff;border:none;padding:3px 6px;border-radius:4px;font-size:10px"><option value="">Status…</option>${Object.keys(ST).map(k=>`<option value="${k}">${k}</option>`).join('')}</select>
      <button onclick="bulkComp()">✎ Compose</button>
      <button onclick="bulkReply()">📧 Bulk Reply</button>
      <button class="bbd" onclick="bulkDel()">✕ Delete</button>
      <button onclick="S.bulk.clear();render()" style="margin-left:auto">Cancel</button>
    </div>`;
  }
  let addHTML='';
  if(S.showAdd){
    addHTML=`<div class="fc"><h2>Add New Lead</h2><div class="fg">
      <div class="fig"><label>Name *</label><input class="fi" id="af-n" placeholder="Full name"></div>
      <div class="fig"><label>Email</label><input class="fi" id="af-e" type="email" placeholder="email@example.com"></div>
      <div class="fig"><label>Interest</label><select class="fi" id="af-i"><option value="">Select…</option>${INTERESTS.map(s=>`<option>${s}</option>`).join('')}</select></div>
      <div class="fig"><label>Status</label><select class="fi" id="af-s">${Object.keys(ST).map(k=>`<option value="${k}">${k}</option>`).join('')}</select></div>
      <div class="fig full"><label>Message</label><textarea class="fi" id="af-m" placeholder="What they said…"></textarea></div>
      <div class="fig full"><label>Notes</label><textarea class="fi" id="af-no" placeholder="Internal notes…"></textarea></div>
      <div class="fa"><button class="btn bp" onclick="submitAdd()">Add Lead</button><button class="btn bs" onclick="S.showAdd=false;render()">Cancel</button></div>
    </div></div>`;
  }
  function thSort(col){return`onclick="sortBy('${col}')"`}
  function thCls(col){return S.sortCol===col?'sorted':''}
  function thArr(col){return S.sortCol===col?(S.sortDir===1?' ↑':' ↓'):''}

  const rows=fl.map((l,i)=>{
    const ns=nextStep(l);
    const nsHTML=ns.act?`<span class="${ns.cls} ns-action" onclick="event.stopPropagation();jumpCompose('${l.id}','${ns.act}')">${ns.text}</span>`:`<span class="${ns.cls}">${ns.text}</span>`;
    return`<tr onclick="openL('${l.id}')" style="animation:fi ${.02*Math.min(i,20)}s ease both">
      <td onclick="event.stopPropagation()"><input type="checkbox" class="lck" ${S.bulk.has(l.id)?'checked':''} onchange="togBk('${l.id}')"></td>
      <td><span class="ln">${esc(l.Name||'(no name)')}</span><div class="le">${esc(l.Email||'')}</div></td>
      <td>${badge(l.Status)}</td>
      <td title="${esc(l.Interest)}">${esc(l.Interest||'—')}</td>
      <td>${esc(l.Last_Email_Type||'—')}</td>
      <td>${fmtDate(l.Last_Email_Date)}</td>
      <td>${l.Days_Since_Inquiry||daysSinceDate(l.Submitted_At)||'—'}d</td>
      <td>${nsHTML}</td>
    </tr>`;
  }).join('');

  return`
    <div class="tb">
      <div class="sw"><span class="sic">⌕</span><input class="sb" placeholder="Search leads…" value="${esc(S.search)}" oninput="S.search=this.value;render()"></div>
      <select class="fs" onchange="S.filter=this.value;render()"><option value="all" ${S.filter==='all'?'selected':''}>All Status</option><option value="needAction" ${S.filter==='needAction'?'selected':''}>⚡ Need Action</option>${Object.keys(ST).map(k=>`<option value="${k}" ${S.filter===k?'selected':''}>${k}</option>`).join('')}</select>
      <select class="fs" onchange="S.filterType=this.value;render()"><option value="all" ${S.filterType==='all'?'selected':''}>All Email Types</option><option value="none" ${S.filterType==='none'?'selected':''}>Never Emailed</option><option value="Initial Response" ${S.filterType==='Initial Response'?'selected':''}>Initial Response</option><option value="Re-Engage" ${S.filterType==='Re-Engage'?'selected':''}>Re-Engage</option><option value="Follow-Up" ${S.filterType==='Follow-Up'?'selected':''}>Follow-Up</option></select>
      <button class="btn bp" onclick="S.showAdd=!S.showAdd;render()">+ Add Lead</button>
      <button class="btn bs" onclick="document.getElementById('csv-in').click()">↑ Import</button>
      <button class="btn bs" onclick="expCSV()">↓ Export</button>
      <input type="file" id="csv-in" accept=".csv,.xlsx,.tsv,.txt" style="display:none" onchange="handleCSV(event)">
    </div>
    ${bulkBar}${addHTML}
    ${fl.length===0?`<div class="empty"><h3>${S.leads.length?'No Results':'No Leads'}</h3><p>${S.leads.length?'Adjust filters.':'Add leads or import a file.'}</p></div>`:`
    <div class="tw"><table>
      <thead><tr>
        <th style="width:28px" onclick="event.stopPropagation()"><input type="checkbox" class="lck" onchange="togAllBk(this.checked)" ${bs===fl.length&&fl.length?'checked':''}></th>
        <th class="${thCls('Name')}" ${thSort('Name')}>Name${thArr('Name')}</th>
        <th class="${thCls('Status')}" ${thSort('Status')}>Status${thArr('Status')}</th>
        <th class="${thCls('Interest')}" ${thSort('Interest')}>Interest${thArr('Interest')}</th>
        <th class="${thCls('Last_Email_Type')}" ${thSort('Last_Email_Type')}>Last Email${thArr('Last_Email_Type')}</th>
        <th class="${thCls('Last_Email_Date')}" ${thSort('Last_Email_Date')}>Sent On${thArr('Last_Email_Date')}</th>
        <th class="${thCls('Days_Since_Inquiry')}" ${thSort('Days_Since_Inquiry')}>Days${thArr('Days_Since_Inquiry')}</th>
        <th class="${thCls('_nextStep')}" ${thSort('_nextStep')}>Next Step${thArr('_nextStep')}</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`}
    <div style="margin-top:8px;font-size:10px;color:var(--bl)">${fl.length} of ${S.leads.length} leads</div>
  `;
};

// COMPOSE
V.compose=()=>{
  const tpls=Object.entries(ETYPES).map(([k,v])=>`<div class="tc ${S.tpl===k?'on':''}" onclick="pickTpl('${k}')"><div class="tcl">${v.icon} ${v.label}</div><div class="tcd">${v.desc}</div></div>`).join('');
  const ll=S.leads.filter(l=>l.Email&&l.Status!=='Bounced'&&l.Status!=='Unsubscribed').map(l=>`<div class="lpi ${S.cLead?.id===l.id?'on':''}" onclick="pickCL('${l.id}')"><span class="sd" style="background:${(ST[l.Status]||ST.New).c}"></span><div><div style="font-weight:500;color:var(--bk);font-size:11px">${esc(l.Name)}</div><div style="font-size:9px;color:var(--bl)">${esc(l.Email)}</div></div></div>`).join('');
  const isPromo=S.tpl==='promo';
  // Promo options
  const promoOpts=isPromo?`
    <div style="margin-top:6px;font-size:9px;font-weight:700;color:var(--bl);text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px">HTML Template</div>
    ${Object.entries(PROMO_TPLS).map(([k,v])=>`<div class="tc ${S.promoTpl===k?'on':''}" onclick="S.promoTpl='${k}';S.genHTML='';render()" style="padding:8px 10px"><div class="tcl" style="font-size:10px">${v.label}</div><div class="tcd">${v.desc}</div></div>`).join('')}
    <div style="margin-top:6px;font-size:9px;font-weight:700;color:var(--bl);text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px">Special Offer</div>
    <select class="fi" style="font-size:10px" onchange="S.promoOffer=this.value;S.genHTML='';render()">
      <option value="none" ${S.promoOffer==='none'?'selected':''}>No offer</option>
      <option value="10off" ${S.promoOffer==='10off'?'selected':''}>10% off any service</option>
      <option value="freepage" ${S.promoOffer==='freepage'?'selected':''}>Free sample page</option>
      <option value="consultation" ${S.promoOffer==='consultation'?'selected':''}>Free discovery call</option>
      <option value="custom" ${S.promoOffer==='custom'?'selected':''}>Custom offer (edit after)</option>
    </select>`:'';
  // Email output — HTML preview for promo, plain text for others
  let emailOutput='';
  if(isPromo&&S.genHTML&&!S.isGen){
    emailOutput=`
      ${S.genSubj?`<div class="esl"><strong>Subject:</strong> ${esc(S.genSubj)}</div>`:''}
      <div style="border:1px solid #E8E2D8;border-radius:var(--rs);overflow:hidden;max-height:460px;overflow-y:auto">
        <iframe id="html-preview" srcdoc="${S.genHTML.replace(/"/g,'&quot;')}" style="width:100%;height:440px;border:none" sandbox="allow-same-origin"></iframe>
      </div>
      <div class="sent-bar" style="flex-wrap:wrap">
        <button class="btn bo bsm" onclick="openHTMLTab()" title="Opens full email in a new tab — select all & copy, then paste into Outlook">🪟 Open in New Tab → Copy → Paste in Outlook</button>
        <div class="sep"></div>
        <button class="btn bs bsm" onclick="downloadHTML()" title="Save as .html file — double-click to preview in browser">💾 Download .html</button>
        <div class="sep"></div>
        <button class="btn bo bsm" onclick="openMailto()">📧 Plain Text Fallback</button>
        <div class="sep"></div>
        <button class="btn bmark bsm" onclick="markSentCurrent()">✓ Mark as Sent</button>
        ${S.webhooks.emailGen?`<button class="btn bs bsm" onclick="sendViaWebhook()" title="Send to n8n">📤 n8n</button>`:''}
      </div>`;
  } else if(!isPromo&&S.genEmail&&!S.isGen){
    emailOutput=`
      ${S.genSubj?`<div class="esl"><strong>Subject:</strong> ${esc(S.genSubj)}</div>`:''}
      <div class="eo">${esc(S.genEmail)}</div>
      <div class="sent-bar">
        <button class="btn bo bsm" onclick="openMailto()">📧 Open in Outlook</button>
        <div class="sep"></div>
        <button class="btn bmark bsm" onclick="markSentCurrent()">✓ Mark as Sent</button>
        <div class="sep"></div>
        <button class="btn bs bsm" onclick="copyEm()">📋 Copy</button>
        ${S.webhooks.emailGen?`<button class="btn bs bsm" onclick="sendViaWebhook()" title="Send to n8n">📤 n8n</button>`:''}
      </div>`;
  } else {
    emailOutput=`
      <div class="eo">${S.isGen?'<span class="gen">Crafting email…</span>':(isPromo?'Select a lead, pick a template + offer, then Generate.':'Select a lead and template, then Generate.')}</div>`;
  }
  return`
    <div class="cl">
      <div class="csb">
        <div style="font-size:9px;font-weight:700;color:var(--bl);text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px">Email Type</div>
        ${tpls}
        ${promoOpts}
        <div style="margin-top:6px;font-size:9px;font-weight:700;color:var(--bl);text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px">Select Lead</div>
        <div class="cc" style="padding:8px"><input class="fi" placeholder="Search…" oninput="filterCL(this.value)" style="margin-bottom:4px;font-size:10px"><div class="lpl" id="lp">${ll}</div></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px">
        ${!S.apiKey?`<div style="font-size:11px;color:var(--red);padding:10px;background:var(--rbg);border-radius:var(--rs)">⚠ Add your API key in <a href="#" onclick="go('settings');return false" style="color:var(--red);font-weight:600">Settings</a> to generate emails.</div>`:''}
        <div class="cc">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
            <h3 style="margin:0">${isPromo?'HTML Email Preview':'Generated Email'}</h3>
            <button class="btn bp bsm" onclick="genEmail()" ${S.isGen?'disabled':''}>${S.isGen?'⟳ Generating…':'⚡ Generate'}</button>
          </div>
          ${S.cLead?`<div style="font-size:10px;color:var(--bl);margin-bottom:8px">To: <strong>${esc(S.cLead.Name)}</strong> ${S.cLead.Email?'‹'+esc(S.cLead.Email)+'›':''} · ${ETYPES[S.tpl]?.label||''}${isPromo?' · '+PROMO_TPLS[S.promoTpl]?.label:''}</div>`:'<div style="font-size:11px;color:var(--bl);margin-bottom:8px">Select a lead from the sidebar</div>'}
          ${S.cLead?.Message?`<div style="font-size:10px;color:var(--bm);margin-bottom:8px;padding:7px;background:var(--bg);border-radius:var(--rs);border-left:3px solid var(--gold)"><strong>Their message:</strong> ${esc(S.cLead.Message)}</div>`:''}
          ${emailOutput}
        </div>
      </div>
    </div>
  `;
};

// IMPORT
V.import=()=>{
  if(!S.csv){S.view='allleads';return V.allleads()}
  const{headers,rows}=S.csv;
  const flds=[{k:'Name',l:'Name'},{k:'Email',l:'Email'},{k:'Interest',l:'Interest'},{k:'Message',l:'Message'},{k:'Status',l:'Status'},{k:'Submitted_At',l:'Submitted Date'},{k:'Notes',l:'Notes'},{k:'Days_Since_Inquiry',l:'Days Since'}];
  const mr=flds.map(f=>`<div class="fig"><label>${f.l}</label><select class="fi" onchange="setMap('${f.k}',this.value)"><option value="">— skip —</option>${headers.map((h,i)=>`<option value="${i}" ${S.csvMap[f.k]==i?'selected':''}>${esc(h)}</option>`).join('')}</select></div>`).join('');
  const pr=rows.slice(0,4).map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('');
  return`<div class="fc"><h2>Import Leads</h2><p style="font-size:11px;color:var(--bl);margin-bottom:14px">${rows.length} rows · ${headers.length} columns</p><div class="mg">${mr}</div><div style="display:flex;gap:5px"><button class="btn bp" onclick="doImport()">Import ${rows.length} Leads</button><button class="btn bs" onclick="S.csv=null;go('allleads')">Cancel</button></div><div class="cpre"><table><thead><tr>${headers.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>${pr}</tbody></table></div></div>`;
};

// BULK REPLY
V.bulkreply=()=>{
  if(!S.bulkQueue?.length)return V.allleads();
  const q=S.bulkQueue;
  const allDone=S.bulkEmails&&S.bulkEmails.length===q.length&&S.bulkEmails.every(e=>e.body);
  const genCount=S.bulkEmails?S.bulkEmails.filter(e=>e.body).length:0;

  // Sidebar: template picker + lead list
  const sidebar=`
    <div class="csb">
      <div style="font-size:9px;font-weight:700;color:var(--bl);text-transform:uppercase;letter-spacing:.7px;margin-bottom:2px">Template</div>
      ${Object.entries(ETYPES).map(([k,v])=>`<div class="tc ${S.tpl===k?'on':''}" onclick="pickTpl('${k}')"><div class="tcl">${v.icon} ${v.label}</div></div>`).join('')}

}
async function brGenAll(){
  if(!S.apiKey){notify('Set API key in Settings');return}
  S.isGen=true;S.bulkEmails=S.bulkQueue.map(()=>({body:'',subject:'',sent:false}));render();
  for(let i=0;i<S.bulkQueue.length;i++){
    const lead=S.bulkQueue[i];
    try{
      // Webhook generation removed — always use direct Anthropic API
    
      const offerTxt={none:'',"10off":'Include a special offer: 10% off any service.',freepage:'Include a special offer: a free sample page.',consultation:'Include a special offer: a free discovery call.',custom:'Include a special offer placeholder: [INSERT YOUR CUSTOM OFFER HERE].'}[S.promoOffer]||'';
      const P={
        initial:`Write a warm first response from Liane at The Lineage Studio to ${lead.Name}. They inquired about "${lead.Interest||'genealogy services'}" and said: "${lead.Message||''}". Thank them, acknowledge their interest, explain what TLS can do, invite a free consultation. 3-4 short paragraphs.`,
        reengage:`Write a warm re-engagement email from Liane at The Lineage Studio to ${lead.Name}. Interest: ${lead.Interest||'genealogy services'} (${lead.Days_Since_Inquiry||'many'} days ago). Reference preserving family history. 3-4 paragraphs.`,
        followup:`Write a friendly follow-up from Liane at The Lineage Studio to ${lead.Name}. Interest: ${lead.Interest||'genealogy services'}. Check timeline, move toward consultation. 2-3 paragraphs.`,
        promo:`Write a promotional newsletter-style email from Liane at The Lineage Studio to ${lead.Name}. Interest: "${lead.Interest||'Family History Book'}". Warm greeting, genealogy tip, highlight their service interest, mention custom-designed books. ${offerTxt} Soft CTA to reply or book a call. Website: lineagestudio.org. 4-5 paragraphs.`,
      };
      const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:P[S.tpl]+'\n\nReturn ONLY the email body. No subject, no markdown. Start with greeting.'}]})});
      const d=await r.json();const body=d.content?.map(c=>c.text||'').join('')||'Error.';
      const sr=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:100,messages:[{role:'user',content:'Write one email subject line. ONLY the subject:\n\n'+body}]})});
      const sd=await sr.json();S.bulkEmails[i]={body,subject:sd.content?.[0]?.text||'',sent:false};
    }catch(e){S.bulkEmails[i]={body:'Failed to generate.',subject:'',sent:false}}
    render();
  }
  S.isGen=false;notify('All '+S.bulkQueue.length+' emails generated!');render();
}
function brOpenOne(idx){
  const l=S.bulkQueue[idx],em=S.bulkEmails[idx];if(!l||!em?.body)return;
  window.open(`mailto:${l.Email||''}?subject=${encodeURIComponent(em.subject||'')}&body=${encodeURIComponent(em.body)}`,'_blank');
}
function brOpenAll(){
  let opened=0;
  for(let i=0;i<S.bulkQueue.length;i++){
    const l=S.bulkQueue[i],em=S.bulkEmails?.[i];
    if(!em?.body||em.sent)continue;
    setTimeout(()=>{window.open(`mailto:${l.Email||''}?subject=${encodeURIComponent(em.subject||'')}&body=${encodeURIComponent(em.body)}`,'_blank')},opened*600);
    opened++;
  }
  notify(opened+' emails opened in Outlook');
}
function brMarkOne(idx){
  if(!S.bulkEmails?.[idx])return;
  S.bulkEmails[idx].sent=true;
  const l=S.bulkQueue[idx];const now=new Date().toISOString().slice(0,10);
  S.leads=S.leads.map(x=>x.id===l.id?{...x,Status:'Contacted',Last_Email_Date:now,Last_Email_Type:ETYPES[S.tpl]?.label||'Re-Engage'}:x);
  saveL();fireStatusHook(l.id,'Contacted');render();
}
async function brSendOneN8n(idx){
  if(!S.webhooks.emailGen){notify('Configure webhook');return}
  const l=S.bulkQueue[idx],em=S.bulkEmails?.[idx];
  if(!l||!em?.body){notify('No email to send');return}
  const htmlBody=(S.tpl==='promo')?buildHTMLEmail(S.promoTpl,{name:l.Name,body:em.body,offer:S.promoOffer,subject:em.subject}):'';
  try{
    await fetch(S.webhooks.emailGen,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to:l.Email,name:l.Name,subject:em.subject||'',body:em.body,htmlBody,emailType:ETYPES[S.tpl]?.label||'',email_type:ETYPES[S.tpl]?.label||'',new_status:'Contacted',interest:l.Interest||''})});
    brMarkOne(idx);
    notify('Sent to '+l.Name);
  }catch(e){notify('Send failed')}
}
function brMarkAllSent(){
  const now=new Date().toISOString().slice(0,10);let ct=0;
  S.bulkQueue.forEach((l,i)=>{
    if(!S.bulkEmails?.[i]?.body||S.bulkEmails[i].sent)return;
    S.bulkEmails[i].sent=true;ct++;
    S.leads=S.leads.map(x=>x.id===l.id?{...x,Status:'Contacted',Last_Email_Date:now,Last_Email_Type:ETYPES[S.tpl]?.label||'Re-Engage'}:x);
    fireStatusHook(l.id,'Contacted');
  });
  saveL();notify(ct+' leads marked as sent');render();
}
function brCopyAll(){
  const text=S.bulkQueue.map((l,i)=>{const em=S.bulkEmails?.[i];if(!em?.body)return'';return`--- ${l.Name} <${l.Email}> ---\nSubject: ${em.subject||''}\n\n${em.body}`}).filter(Boolean).join('\n\n');
  navigator.clipboard.writeText(text).then(()=>notify('All emails copied'));
}

function pickCL(id){S.cLead=S.leads.find(l=>l.id===id)||null;S.genEmail='';S.genSubj='';S.genHTML='';render()}

function copyEm(){navigator.clipboard.writeText((S.genSubj?'Subject: '+S.genSubj+'\n\n':'')+S.genEmail).then(()=>notify('Copied'))}

// Bulk send all via n8n — one at a time with delay
async function brSendAllN8n(){
  if(!S.webhooks.emailGen){notify('Configure email webhook in Settings');return}
  if(!S.bulkEmails?.length){notify('Generate emails first');return}
  const q=S.bulkQueue;let sent=0;
  notify('Sending via n8n…');
  for(let i=0;i<q.length;i++){
    const l=q[i],em=S.bulkEmails[i];
    if(!em?.body||em.sent||l.Status==='Bounced'||l.Status==='Unsubscribed')continue;
    // Build HTML if promo
    const htmlBody=(S.tpl==='promo')?buildHTMLEmail(S.promoTpl,{name:l.Name,body:em.body,offer:S.promoOffer,subject:em.subject}):'';
    const payload={
      to:l.Email,name:l.Name,subject:em.subject||'',body:em.body,
      htmlBody,emailType:ETYPES[S.tpl]?.label||'',email_type:ETYPES[S.tpl]?.label||'',new_status:'Contacted',interest:l.Interest||'',leadId:l.id
    };
    try{
      await fetch(S.webhooks.emailGen,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      S.bulkEmails[i].sent=true;
      const now=new Date().toISOString().slice(0,10);
      S.leads=S.leads.map(x=>x.id===l.id?{...x,Status:'Contacted',Last_Email_Date:now,Last_Email_Type:ETYPES[S.tpl]?.label||''}:x);
      sent++;
      render();
    }catch(e){}
    // 30-second delay between sends to avoid spam flags
    if(i<q.length-1)await new Promise(r=>setTimeout(r,30000));
  }
  saveL();notify(sent+' emails sent via n8n!');render();
}

// AI Email Gen
async function genEmail(){
  const lead=S.cLead;if(!lead){notify('Select a lead');return}
  if(!S.apiKey){notify('Set API key in Settings');return}
  S.isGen=true;S.genEmail='';S.genSubj='';S.genHTML='';render();
  // Webhook generation removed — always use direct Anthropic API
  const offerText={none:'',"10off":'Include a special offer: 10% off any service for a limited time.',freepage:'Include a special offer: a free sample page so they can see the quality before committing.',consultation:'Include a special offer: a free 20-minute discovery call to plan their project.',custom:'Include a special offer placeholder: [INSERT YOUR CUSTOM OFFER HERE].'}[S.promoOffer]||'';
  const promoContext={newsletter:'a monthly newsletter',holiday:'a holiday/family reunion season promotional email — reference the season, family gatherings, and the gift of preserving memories',newservices:'a new services announcement email — introduce new offerings with excitement'}[S.promoTpl]||'a promotional email';
  const P={
    initial:`Write a warm first response from Liane at The Lineage Studio to ${lead.Name}. They inquired about "${lead.Interest||'genealogy services'}" and said: "${lead.Message||''}". Thank them, acknowledge their interest, explain what TLS can do, invite a free consultation. 3-4 short paragraphs. Warm and personal.`,
    reengage:`Write a warm re-engagement email from Liane at The Lineage Studio to ${lead.Name}. Interest: ${lead.Interest||'genealogy services'} (${lead.Days_Since_Inquiry||'many'} days ago). Reference preserving family history. Warm, not salesy. 3-4 paragraphs.`,
    followup:`Write a friendly follow-up from Liane at The Lineage Studio to ${lead.Name}. Interest: ${lead.Interest||'genealogy services'}. Check timeline, answer questions, move toward consultation. 2-3 paragraphs.`,
    promo:`Write the body text for ${promoContext} from Liane at The Lineage Studio to ${lead.Name}. Their interest: "${lead.Interest||'Family History Book'}". Open with a warm personal greeting using their first name. Include a genealogy tip or seasonal insight. Highlight their service interest and its emotional/legacy value. ${offerText} Close warmly as Liane. Keep it personal and conversational, not corporate. 4-5 paragraphs. Do NOT include services lists, headers, or formatting — the HTML template handles that. Just the personal letter content.`,
  };
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:P[S.tpl]+'\n\nReturn ONLY the email body. No subject, no markdown. Start with greeting.'}]})});
    const d=await r.json();S.genEmail=d.content?.map(c=>c.text||'').join('')||'Error.';
    const sr=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:100,messages:[{role:'user',content:'Write one email subject line. ONLY the subject:\n\n'+S.genEmail}]})});
    const sd=await sr.json();S.genSubj=sd.content?.[0]?.text||'';
    // Build HTML for promo
    if(S.tpl==='promo'){S.genHTML=buildHTMLEmail(S.promoTpl,{name:lead.Name,body:S.genEmail,offer:S.promoOffer,subject:S.genSubj})}
  }catch(e){S.genEmail='Failed. Check API key.'}
  S.isGen=false;render();
}

function openHTMLTab(){
  if(!S.genHTML){notify('No email to open');return}
  const banner=`<div style="position:fixed;top:0;left:0;right:0;background:#1B2A4A;color:#fff;padding:10px 20px;font-family:'Segoe UI',Arial,sans-serif;font-size:14px;display:flex;align-items:center;justify-content:space-between;z-index:9999;box-shadow:0 2px 8px rgba(0,0,0,.2)"><div><strong>Step 1:</strong> Press <kbd style="background:#2E5339;padding:2px 8px;border-radius:4px;font-size:13px">Ctrl+A</kbd> to select all &nbsp;→&nbsp; <strong>Step 2:</strong> Press <kbd style="background:#2E5339;padding:2px 8px;border-radius:4px;font-size:13px">Ctrl+C</kbd> to copy &nbsp;→&nbsp; <strong>Step 3:</strong> Paste into Outlook with <kbd style="background:#2E5339;padding:2px 8px;border-radius:4px;font-size:13px">Ctrl+V</kbd></div><button onclick="this.parentElement.remove()" style="background:none;border:none;color:#8B9DC3;font-size:18px;cursor:pointer;padding:0 4px">✕</button></div><div style="height:48px"></div>`;
  const fullHTML=S.genHTML.replace('<body','<body'+' ');
  const withBanner=fullHTML.replace(/<body[^>]*>/i,(m)=>m+banner);
  const w=window.open('','_blank');
  if(w){w.document.write(withBanner);w.document.close();w.document.title='TLS Email — '+esc(S.cLead?.Name||'');notify('Opened in new tab — follow the steps to copy')}
  else notify('Pop-up blocked — allow pop-ups and try again');
}
function downloadHTML(){
  if(!S.genHTML){notify('No email to download');return}
  const name=S.cLead?S.cLead.Name.replace(/[^a-zA-Z0-9]/g,'_'):'email';
  const blob=new Blob([S.genHTML],{type:'text/html'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`TLS_Email_${name}_${new Date().toISOString().slice(0,10)}.html`;
  a.click();
  notify('Downloaded — double-click the file to preview in your browser');
}

// CSV
function handleCSV(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=(ev)=>{const lines=ev.target.result.split('\n').filter(l=>l.trim());if(lines.length<2){notify('Empty');return}const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));const rows=lines.slice(1).map(line=>{const v=[];let c='',q=false;for(const ch of line){if(ch==='"')q=!q;else if(ch===','&&!q){v.push(c.trim());c=''}else c+=ch}v.push(c.trim());return v});S.csv={headers,rows};S.csvMap={};headers.forEach((h,i)=>{const hl=h.toLowerCase();if(hl.includes('name')&&!hl.includes('last'))S.csvMap.Name=i;else if(hl.includes('email'))S.csvMap.Email=i;else if(hl.includes('interest')||hl.includes('service'))S.csvMap.Interest=i;else if(hl.includes('message'))S.csvMap.Message=i;else if(hl.includes('status'))S.csvMap.Status=i;else if(hl.includes('submit')||hl.includes('date'))S.csvMap.Submitted_At=i;else if(hl.includes('note'))S.csvMap.Notes=i;else if(hl.includes('days'))S.csvMap.Days_Since_Inquiry=i});S.view='import';render()};reader.readAsText(file);e.target.value=''}
function setMap(f,v){S.csvMap[f]=v}
function doImport(){if(!S.csv)return;const imported=S.csv.rows.map(row=>{const l={id:uid(),Status:'New',Interest:'',Message:'',Notes:'',Days_Since_Inquiry:0,Last_Email_Date:'',Last_Email_Type:'',Submitted_At:new Date().toISOString().slice(0,10),Name:'',Email:''};Object.entries(S.csvMap).forEach(([f,ci])=>{if(ci!==''&&ci!==undefined)l[f]=row[Number(ci)]||''});if(l.Days_Since_Inquiry)l.Days_Since_Inquiry=Number(l.Days_Since_Inquiry)||0;return l}).filter(l=>l.Name||l.Email);S.leads=[...imported,...S.leads];saveL();S.csv=null;go('allleads');notify(imported.length+' imported')}
function expCSV(){const h=['Name','Email','Interest','Message','Submitted_At','Status','Days_Since_Inquiry','Notes','Last_Email_Date','Last_Email_Type'];const rows=S.leads.map(l=>h.map(k=>{const v=(l[k]??'').toString();return v.includes(',')||v.includes('"')?'"'+v.replace(/"/g,'""')+'"':v}));const csv=[h.join(','),...rows.map(r=>r.join(','))].join('\n');const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='lineage-studio-leads.csv';a.click();notify('Exported')}
async function syncLeads(){if(!S.webhooks.sync){notify('Configure sync webhook');return}try{notify('Syncing…');const r=await fetch(S.webhooks.sync);const d=await r.json();if(Array.isArray(d)&&d.length){S.leads=d.map((r,i)=>({...r,id:'sync'+i}));saveL();notify(d.length+' synced');render()}else notify('No data')}catch(e){notify('Sync failed')}}
function reloadSeed(){if(!confirm('Reload original 115 leads?'))return;S.leads=SEED.map((r,i)=>({...r,id:'s'+i}));saveL();notify('Restored');render()}
function resetAll(){if(!confirm('Clear ALL?'))return;S.leads=[];saveL();notify('Cleared');render()}

init();
</script>
