<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Manager v2 — The Lineage Studio</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🌳</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--forest:#5B8C5A;--forest-d:#4A7A49;--forest-bg:#5B8C5A14;--gold:#D4A853;--gold-bg:#D4A85314;--ember:#E8913A;--ember-bg:#E8913A14;--crimson:#C75146;--crimson-bg:#C7514614;--teal:#2E7D6F;--teal-bg:#2E7D6F14;--slate:#8B8B8B;--slate-bg:#8B8B8B14;--purple:#7B68A5;--purple-bg:#7B68A514;--parchment:#FAF7F2;--cream:#F3EDE3;--bark:#3B2F24;--bark-m:#6B5D50;--bark-l:#9B8E80;--ink:#2C2420;--white:#fff;--rad:10px;--rad-s:6px;--sh:0 1px 3px rgba(59,47,36,.06);--sh-m:0 4px 16px rgba(59,47,36,.08);--sh-l:0 8px 32px rgba(59,47,36,.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--parchment);color:var(--ink);min-height:100vh;line-height:1.5}
h1,h2,h3{font-family:'Cormorant Garamond',serif;font-weight:600}
::selection{background:#5B8C5A33}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#C4B49A55;border-radius:3px}
input,select,textarea,button{font-family:'DM Sans',sans-serif}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--forest)!important;box-shadow:0 0 0 3px #5B8C5A22}
button{cursor:pointer;transition:all .15s;border:none}
button:active{transform:scale(.97)}
a{color:var(--forest);text-decoration:none}

header{background:var(--white);border-bottom:1px solid #E8E2D8;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:var(--sh)}
.h-left{display:flex;align-items:center;gap:12px}
.logo{width:34px;height:34px;background:var(--forest);color:var(--white);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-weight:700;font-size:12px;letter-spacing:.5px}
.h-title{font-size:18px;color:var(--bark);line-height:1.1}
.h-sub{font-size:10px;color:var(--bark-l);font-weight:600;letter-spacing:.8px;text-transform:uppercase}
nav{display:flex;gap:3px}
.nb{padding:7px 14px;border-radius:var(--rad-s);background:0 0;color:var(--bark-m);font-size:12px;font-weight:500;display:flex;align-items:center;gap:5px}
.nb:hover{background:var(--cream);color:var(--bark)}
.nb.on{background:var(--forest);color:var(--white)}
.nb.on:hover{background:var(--forest-d)}

main{flex:1;padding:24px 28px;max-width:1320px;width:100%;margin:0 auto}
.toast{position:fixed;bottom:20px;right:20px;background:var(--bark);color:var(--white);padding:10px 18px;border-radius:var(--rad);font-size:12px;font-weight:500;box-shadow:var(--sh-l);z-index:999;animation:ti .3s ease}
@keyframes ti{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes si{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
@keyframes pu{0%,100%{opacity:.4}50%{opacity:1}}

/* Dashboard */
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px;margin-bottom:24px}
.sc{background:var(--white);border-radius:var(--rad);padding:18px;box-shadow:var(--sh);border-left:4px solid var(--forest);animation:fi .3s ease both}
.sc .lb{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--bark-l);font-weight:600;margin-bottom:4px}
.sc .vl{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:700;color:var(--bark)}
.sc .su{font-size:11px;color:var(--bark-m);margin-top:2px}
.pc{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px}
.pcol{background:var(--white);border-radius:var(--rad);padding:14px;box-shadow:var(--sh);animation:fi .35s ease both}
.pcol-h{display:flex;align-items:center;gap:7px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #EDE8E0}
.sd{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.pcol-t{font-size:12px;font-weight:600;color:var(--bark)}
.pcol-c{font-size:10px;color:var(--bark-l);margin-left:auto;font-weight:600;background:var(--cream);padding:1px 7px;border-radius:10px}
.pi{padding:7px 9px;margin-bottom:5px;background:var(--parchment);border-radius:var(--rad-s);font-size:12px;color:var(--bark);cursor:pointer;transition:background .1s}
.pi:hover{background:var(--cream)}
.pi-n{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pi-s{font-size:10px;color:var(--bark-l);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Toolbar */
.tb{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.sw{position:relative;flex:1;min-width:180px}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--bark-l);font-size:13px;pointer-events:none}
.sb{width:100%;padding:8px 12px 8px 32px;border:1px solid #DDD7CD;border-radius:var(--rad-s);font-size:12px;background:var(--white)}
.fs{padding:8px 12px;border:1px solid #DDD7CD;border-radius:var(--rad-s);font-size:12px;background:var(--white);color:var(--bark);min-width:130px}
.btn{padding:8px 14px;border-radius:var(--rad-s);font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.bp{background:var(--forest);color:var(--white)}.bp:hover{background:var(--forest-d)}
.bs{background:var(--cream);color:var(--bark)}.bs:hover{background:#E8E2D8}
.bd{background:var(--crimson);color:var(--white)}.bd:hover{background:#B04439}
.bg{background:0 0;color:var(--bark-m)}.bg:hover{background:var(--cream);color:var(--bark)}
.bsm{padding:5px 10px;font-size:11px}

/* Table */
.tw{background:var(--white);border-radius:var(--rad);box-shadow:var(--sh);overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:700px}
thead{background:#F9F6F1}
th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--bark-l);border-bottom:1px solid #EDE8E0}
td{padding:10px 14px;font-size:12px;border-bottom:1px solid #F3EDE3;color:var(--bark);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tbody tr{transition:background .1s}
tbody tr:hover{background:#FAF7F2}
.sb-badge{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.ln{font-weight:600;cursor:pointer;color:var(--bark)}.ln:hover{color:var(--forest)}
.le{font-size:11px;color:var(--bark-l)}
.lck{width:15px;height:15px;accent-color:var(--forest);cursor:pointer}
.empty{text-align:center;padding:50px 20px;color:var(--bark-l)}
.empty h3{font-size:18px;margin-bottom:6px;color:var(--bark-m)}

/* Bulk bar */
.bb{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--forest);color:var(--white);border-radius:var(--rad);margin-bottom:10px;font-size:12px;font-weight:500;animation:fi .2s ease}
.bb button{background:rgba(255,255,255,.2);color:#fff;padding:4px 10px;border-radius:var(--rad-s);font-size:11px;font-weight:600}
.bb button:hover{background:rgba(255,255,255,.3)}
.bb .bbd{background:rgba(199,81,70,.7)}.bb .bbd:hover{background:rgba(199,81,70,.9)}

/* Detail panel */
.ov{position:fixed;inset:0;background:rgba(44,36,32,.25);z-index:200;display:flex;justify-content:flex-end}
.dp{width:480px;max-width:100vw;background:var(--white);height:100vh;overflow-y:auto;box-shadow:-8px 0 32px rgba(44,36,32,.12);animation:si .25s ease;padding:24px}
.dp-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.dp-n{font-size:24px;color:var(--bark)}
.dp-x{background:none;font-size:20px;color:var(--bark-l);padding:4px}.dp-x:hover{color:var(--bark)}
.dp-g{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.df label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--bark-l);font-weight:600;margin-bottom:3px}
.df .v{font-size:13px;color:var(--bark)}
.dp-msg{margin-bottom:20px}
.dp-msg .v{font-size:13px;color:var(--bark);white-space:pre-wrap;background:var(--parchment);padding:10px;border-radius:var(--rad-s);min-height:40px;line-height:1.6}
.dp-a{display:flex;gap:6px;flex-wrap:wrap}

/* Forms */
.fc{background:var(--white);border-radius:var(--rad);padding:24px;box-shadow:var(--sh);animation:fi .3s ease;margin-bottom:16px}
.fc h2{font-size:20px;color:var(--bark);margin-bottom:16px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fi-g{display:flex;flex-direction:column}
.fi-g.full{grid-column:1/-1}
.fi-g label{font-size:11px;font-weight:600;color:var(--bark-m);margin-bottom:4px}
.fi{padding:8px 10px;border:1px solid #DDD7CD;border-radius:var(--rad-s);font-size:12px;background:var(--white);color:var(--ink);width:100%}
textarea.fi{resize:vertical;min-height:60px}
.fa{display:flex;gap:6px;margin-top:14px;grid-column:1/-1}

/* Compose */
.cl{display:grid;grid-template-columns:260px 1fr;gap:16px}
.c-sb{display:flex;flex-direction:column;gap:6px}
.tc{background:var(--white);border-radius:var(--rad);padding:12px 14px;box-shadow:var(--sh);cursor:pointer;border:2px solid transparent;transition:all .15s}
.tc:hover{border-color:var(--cream)}
.tc.on{border-color:var(--forest);background:var(--forest-bg)}
.tc-i{font-size:16px;margin-bottom:2px}
.tc-l{font-size:12px;font-weight:600;color:var(--bark)}
.tc-d{font-size:10px;color:var(--bark-l);margin-top:1px}
.cc{background:var(--white);border-radius:var(--rad);padding:20px;box-shadow:var(--sh)}
.cc h3{font-size:16px;color:var(--bark);margin-bottom:12px}
.eo{background:var(--parchment);border-radius:var(--rad-s);padding:16px;font-size:13px;line-height:1.7;color:var(--bark);white-space:pre-wrap;min-height:160px;border:1px solid #EDE8E0}
.es-line{background:var(--parchment);border-radius:var(--rad-s);padding:8px 12px;font-size:12px;font-weight:500;color:var(--bark);margin-bottom:10px;border:1px solid #EDE8E0}
.gen{color:var(--bark-l);font-style:italic;animation:pu 1.5s ease infinite}
.lpl{max-height:180px;overflow-y:auto}
.lpi{padding:7px 10px;border-radius:var(--rad-s);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s;font-size:12px}
.lpi:hover{background:var(--cream)}
.lpi.on{background:var(--forest-bg)}

/* Import */
.mg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.cpre{margin-top:12px;overflow-x:auto}
.cpre table{font-size:11px;min-width:auto}
.cpre th{background:var(--cream);font-size:9px}
.cpre td{font-size:11px;padding:5px 8px;max-width:140px}

/* Settings */
.s-row{margin-bottom:16px}
.s-row label{font-size:11px;font-weight:600;color:var(--bark-m);display:block;margin-bottom:4px}
.s-row p{font-size:11px;color:var(--bark-l);margin-bottom:6px}

@media(max-width:768px){
  header{padding:0 12px;flex-wrap:wrap;height:auto;padding:10px 12px;gap:6px}
  main{padding:14px}
  .cl{grid-template-columns:1fr}
  .fg{grid-template-columns:1fr}
  .dp{width:100%}
  .dg{grid-template-columns:repeat(2,1fr)}
  .pc{grid-template-columns:repeat(2,1fr)}
  .mg{grid-template-columns:1fr}
}
</style>
</head>

let S={
  leads:[],view:'dashboard',sel:null,editing:null,search:'',filter:'all',
  showAdd:false,tpl:'reengage',cLead:null,genEmail:'',genSubj:'',isGen:false,
  bulk:new Set(),csv:null,csvMap:{},bulkQueue:[],bulkIdx:0,bulkResults:[],
  apiKey:localStorage.getItem('tls_api_key')||'',
  webhooks:JSON.parse(localStorage.getItem('tls_webhooks')||'{}'),
  notif:null,nTimer:null
};

function init(){
  try{
    const d=localStorage.getItem('tls_leads_v2');
    if(d){S.leads=JSON.parse(d)}
    else{S.leads=SEED_DATA.map((r,i)=>({...r,id:'s'+i}));saveL()}
  }catch(e){S.leads=SEED_DATA.map((r,i)=>({...r,id:'s'+i}));saveL()}
  render();
}
function saveL(){localStorage.setItem('tls_leads_v2',JSON.stringify(S.leads))}
function saveK(){localStorage.setItem('tls_api_key',S.apiKey)}
function saveW(){localStorage.setItem('tls_webhooks',JSON.stringify(S.webhooks))}
function notify(m){S.notif=m;clearTimeout(S.nTimer);render();S.nTimer=setTimeout(()=>{S.notif=null;render()},3e3)}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function sbadge(st){const c=STATUS_CFG[st]||STATUS_CFG.New;return`<span class="sb-badge" style="background:${c.bg};color:${c.color}">● ${c.label}</span>`}
function daysSince(d){if(!d)return'';const ms=Date.now()-new Date(d).getTime();return Math.max(0,Math.floor(ms/864e5))}

function getStats(){
  const l=S.leads;
  return{
    total:l.length,
    new_ct:l.filter(x=>x.Status==='New').length,
    contacted:l.filter(x=>x.Status==='Contacted').length,
    warm:l.filter(x=>x.Status==='Warm').length,
    replied:l.filter(x=>x.Status==='Replied').length,
    bounced:l.filter(x=>x.Status==='Bounced').length,
    unsub:l.filter(x=>x.Status==='Unsubscribed').length,
    byInterest:{}
  };
}
function getFiltered(){
  return S.leads.filter(l=>{
    const q=S.search.toLowerCase();
    const ms=!q||[l.Name,l.Email,l.Interest,l.Message,l.Notes].some(f=>f&&f.toLowerCase().includes(q));
    const mf=S.filter==='all'||l.Status===S.filter;
    return ms&&mf;
  });
}

/* ── RENDER ── */
function render(){
  const app=document.getElementById('app');
  app.innerHTML=`
    ${S.notif?`<div class="toast">${esc(S.notif)}</div>`:''}
    <header>
      <div class="h-left">
        <div class="logo">TLS</div>
        <div><h1 class="h-title">Lead Manager <span style="font-family:'DM Sans';font-size:11px;font-weight:400;color:var(--bark-l)">v2</span></h1><div class="h-sub">The Lineage Studio</div></div>
      </div>
      <nav>
        ${['dashboard','leads','compose','settings'].map(v=>`<button class="nb ${S.view===v?'on':''}" onclick="go('${v}')">${{dashboard:'◉ Dashboard',leads:'☰ Leads',compose:'✎ Compose',settings:'⚙ Settings'}[v]}</button>`).join('')}
      </nav>
    </header>
    <main>${views[S.view]?views[S.view]():views.dashboard()}</main>
    ${S.sel&&!S.editing?detailPanel():''}
    ${S.editing?editPanel():''}
  `;
}
function go(v){S.view=v;S.showAdd=false;render()}

/* ── DASHBOARD ── */
const views={};
views.dashboard=()=>{
  const s=getStats();
  const groups={};
  Object.keys(STATUS_CFG).forEach(k=>groups[k]=S.leads.filter(l=>l.Status===k));
  let pipe='';
  for(const[k,cfg]of Object.entries(STATUS_CFG)){
    const items=groups[k]||[];
    if(!items.length)continue;
    pipe+=`<div class="pcol"><div class="pcol-h"><span class="sd" style="background:${cfg.color}"></span><span class="pcol-t">${cfg.label}</span><span class="pcol-c">${items.length}</span></div>${items.slice(0,5).map(l=>`<div class="pi" onclick="openLead('${l.id}')"><div class="pi-n">${esc(l.Name)}</div><div class="pi-s">${esc(l.Interest||'')}</div></div>`).join('')}${items.length>5?`<div style="font-size:10px;color:var(--bark-l);padding:3px 9px">+${items.length-5} more</div>`:''}</div>`;
  }
  // Interest breakdown
  const intCounts={};
  S.leads.forEach(l=>{const k=l.Interest||'Unknown';intCounts[k]=(intCounts[k]||0)+1});
  const intSorted=Object.entries(intCounts).sort((a,b)=>b[1]-a[1]);
  let intHTML=intSorted.map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid #F3EDE3"><span style="color:var(--bark)">${esc(k)}</span><span style="font-weight:600;color:var(--bark-m)">${v}</span></div>`).join('');

  return`
    <div class="dg">
      <div class="sc" style="border-left-color:var(--forest)"><div class="lb">Total Leads</div><div class="vl">${s.total}</div></div>
      <div class="sc" style="border-left-color:#5B8C5A"><div class="lb">New</div><div class="vl">${s.new_ct}</div></div>
      <div class="sc" style="border-left-color:var(--gold)"><div class="lb">Contacted</div><div class="vl">${s.contacted}</div></div>
      <div class="sc" style="border-left-color:var(--ember)"><div class="lb">Warm / Replied</div><div class="vl">${s.warm+s.replied}</div></div>
      <div class="sc" style="border-left-color:var(--crimson)"><div class="lb">Bounced</div><div class="vl">${s.bounced}</div></div>
      <div class="sc" style="border-left-color:var(--slate)"><div class="lb">Unsubscribed</div><div class="vl">${s.unsub}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 320px;gap:16px">
      <div>
        <h2 style="font-size:20px;color:var(--bark);margin-bottom:12px">Pipeline</h2>
        <div class="pc">${pipe}</div>
      </div>
      <div>
        <div class="fc" style="margin-bottom:0">
          <h3 style="font-size:16px;margin-bottom:10px">By Interest</h3>
          ${intHTML}
        </div>
      </div>
    </div>
  `;
};

// AI Email
async function genEmail(){
  const lead=S.cLead;
  if(!lead){notify('Select a lead first');return}
  if(!S.apiKey&&!S.webhooks.emailGen){notify('Set up API key or n8n webhook in Settings');return}
  S.isGen=true;S.genEmail='';S.genSubj='';render();

  // Try n8n webhook first if configured
  if(S.webhooks.emailGen){
    try{
      const r=await fetch(S.webhooks.emailGen,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({lead,emailType:EMAIL_TYPES[S.tpl].label})});
      const d=await r.json();
      S.genEmail=d.email||d.body||d.text||JSON.stringify(d);
      S.genSubj=d.subject||'';
      S.isGen=false;render();return;
    }catch(e){/* Fall through to API */}
  }

  const prompts={
    initial:`Write a warm, welcoming first response email from Liane at The Lineage Studio to ${lead.Name}. They inquired about "${lead.Interest||'genealogy services'}" and said: "${lead.Message||''}". Thank them for reaching out, acknowledge their specific interest, explain briefly what The Lineage Studio can do for them, and invite them to schedule a free consultation. 3-4 short paragraphs. Warm and personal, not corporate.`,
    reengage:`Write a warm re-engagement email from Liane at The Lineage Studio to ${lead.Name}. They previously showed interest in ${lead.Interest||'genealogy services'} (${lead.Days_Since_Inquiry||'many'} days ago) but haven't been in touch. Reference the value of preserving family history before it's too late. Warm, not salesy. 3-4 short paragraphs.`,
    followup:`Write a friendly follow-up email from Liane at The Lineage Studio to ${lead.Name}. They're interested in ${lead.Interest||'genealogy services'}. Check in on their timeline and any questions. Gently move toward scheduling a consultation. 2-3 paragraphs.`,
    promo:`Write a compelling but tasteful email from Liane at The Lineage Studio to ${lead.Name} about the "${lead.Interest||'Family History Book'}" service. Highlight the emotional and legacy value. Include what's involved and a soft call to action. 3-4 paragraphs.`,
  };
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompts[S.tpl]+'\n\nReturn ONLY the email body. No subject line, no markdown, no labels. Start with the greeting.'}]})});
    const d=await r.json();
    S.genEmail=d.content?.map(c=>c.text||'').join('')||'Error generating email.';
    const sr=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:100,messages:[{role:'user',content:'Write one email subject line for this email. Return ONLY the subject, nothing else:\n\n'+S.genEmail}]})});
    const sd=await sr.json();
    S.genSubj=sd.content?.[0]?.text||'';
  }catch(e){S.genEmail='Generation failed. Check your API key.'}
  S.isGen=false;render();
}

// CSV/Import
function trigImp(){document.getElementById('csv-in').click()}
function parseCSV(txt){
  const lines=txt.split('\n').filter(l=>l.trim());
  if(lines.length<2)return null;
  const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  const rows=lines.slice(1).map(line=>{
    const vals=[];let cur='',inQ=false;
    for(const ch of line){if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){vals.push(cur.trim());cur=''}else cur+=ch}
    vals.push(cur.trim());return vals;
  });
  return{headers,rows};
}
function handleCSV(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=(ev)=>{
    const data=parseCSV(ev.target.result);
    if(!data){notify('Could not parse file');return}
    S.csv=data;S.csvMap={};
    data.headers.forEach((h,i)=>{
      const hl=h.toLowerCase();
      if(hl.includes('name')&&!hl.includes('last'))S.csvMap.Name=i;
      else if(hl.includes('email'))S.csvMap.Email=i;
      else if(hl.includes('interest')||hl.includes('service'))S.csvMap.Interest=i;
      else if(hl.includes('message'))S.csvMap.Message=i;
      else if(hl.includes('status'))S.csvMap.Status=i;
      else if(hl.includes('submit')||hl.includes('date'))S.csvMap.Submitted_At=i;
      else if(hl.includes('note'))S.csvMap.Notes=i;
      else if(hl.includes('days'))S.csvMap.Days_Since_Inquiry=i;
    });
    S.view='import';render();
  };
  reader.readAsText(file);
  e.target.value='';
}
function setMap(f,v){S.csvMap[f]=v}
function doImport(){
  if(!S.csv)return;
  const{rows}=S.csv;
  const imported=rows.map(row=>{
    const lead={id:uid(),Status:'New',Interest:'',Message:'',Notes:'',Days_Since_Inquiry:0,Last_Email_Date:'',Last_Email_Type:'',Submitted_At:new Date().toISOString().slice(0,10),Name:'',Email:''};
    Object.entries(S.csvMap).forEach(([f,ci])=>{if(ci!==''&&ci!==undefined)lead[f]=row[Number(ci)]||''});
    if(lead.Days_Since_Inquiry)lead.Days_Since_Inquiry=Number(lead.Days_Since_Inquiry)||0;
    return lead;
  }).filter(l=>l.Name||l.Email);
  S.leads=[...imported,...S.leads];saveL();S.csv=null;S.csvMap={};
  go('leads');notify(imported.length+' leads imported');
}
function expCSV(){
  const h=['Name','Email','Interest','Message','Submitted_At','Status','Days_Since_Inquiry','Notes','Last_Email_Date','Last_Email_Type'];
  const rows=S.leads.map(l=>h.map(k=>{const v=(l[k]??'').toString();return v.includes(',')||v.includes('"')?'"'+v.replace(/"/g,'""')+'"':v}));
  const csv=[h.join(','),...rows.map(r=>r.join(','))].join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='lineage-studio-leads.csv';a.click();
  notify('Exported');
}
async function syncLeads(){
  if(!S.webhooks.sync){notify('Configure sync webhook in Settings');return}
  try{
    notify('Syncing…');
    const r=await fetch(S.webhooks.sync);
    const data=await r.json();
    if(Array.isArray(data)&&data.length){
      S.leads=data.map((r,i)=>({...r,id:'sync'+i}));saveL();
      notify(data.length+' leads synced');render();
    }else{notify('No data returned')}
  }catch(e){notify('Sync failed')}
}
function reloadSeed(){
  if(!confirm('Reload the original 115 leads? Current data will be replaced.'))return;
  S.leads=SEED_DATA.map((r,i)=>({...r,id:'s'+i}));saveL();notify('Original data restored');render();
}
function resetAll(){
  if(!confirm('Clear ALL leads?'))return;
  S.leads=[];saveL();notify('Cleared');render();
}

init();
</script>
